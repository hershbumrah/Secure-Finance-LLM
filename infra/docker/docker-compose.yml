services:
  # Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6335}:6333"
      - "${QDRANT_GRPC_PORT:-6336}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - finance_llm_net

  # Backend API
  backend:
    image: docker-backend:latest
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: finance_llm_backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434}
      - LLM_MODEL=${LLM_MODEL:-llama3}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-minilm}
      - JWT_SECRET=${JWT_SECRET:-CHANGE-THIS-SECRET-KEY-IN-PRODUCTION}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
    networks:
      - finance_llm_net

  # Frontend
  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: finance_llm_frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - finance_llm_net

volumes:
  qdrant_data:

networks:
  finance_llm_net:
    driver: bridge
